name: CI

on:
  push:
    branches: [ feature/*, fix/*, main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend — compile and test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: openlens
          POSTGRES_USER: openlens
          POSTGRES_PASSWORD: openlens
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: compile
        working-directory: backend
        run: mvn compile -q
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: run tests
        working-directory: backend
        run: mvn test -q
        env:
          GITHUB_TOKEN: placeholder
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/openlens
          SPRING_DATASOURCE_USERNAME: openlens
          SPRING_DATASOURCE_PASSWORD: openlens
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_KAFKA_BOOTSTRAP_SERVERS: localhost:9092

  frontend:
    name: Frontend — install and build
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: install dependencies
        working-directory: frontend
        run: npm ci

      - name: build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8080
